services:
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    restart: unless-stopped
    read_only: true
    cap_drop:
      - all
    security_opt:
      - no-new-privileges:true
    environment:
      - CLOUDFLARE_API_TOKEN
      - DOMAINS=wolf.enucatl.com
      - PROXIED=false
    networks:
      - cloudflare

  wolf:
    image: ghcr.io/games-on-whales/wolf:stable
    container_name: wolf
    restart: unless-stopped
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
      - XDG_RUNTIME_DIR=/tmp/sockets
    volumes:
      - /opt/wolf:/etc/wolf
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /dev/:/dev/:rw
      - /run/udev:/run/udev:rw
      - /var/lib/wolf:/tmp/sockets  # XDG_RUNTIME_DIR bind-mount so Wolf can resolve host socket path for child containers
    devices:
      - /dev/dri
      - /dev/uinput
    device_cgroup_rules:
      - 'c 13:* rmw'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "47984:47984/tcp"   # HTTPS
      - "47989:47989/tcp"   # HTTP
      - "47999:47999/udp"   # Control
      - "48010:48010/tcp"   # RTSP
      - "48100:48100/udp"   # Video
      - "48200:48200/udp"   # Audio
    networks:
      - cloudflare

networks:
  cloudflare:
    enable_ipv6: true
